<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>目標九宮格工具 - 進階版</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & ReactDOM CDN -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Babel for JSX transformation -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- html2canvas for Image Export -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <!-- SheetJS for Excel Export -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap');
        body {
            font-family: 'Noto Sans TC', sans-serif;
        }
        /* 確保 Textarea 垂直置中的關鍵 */
        .cell-container {
            display: grid;
            place-items: center;
            height: 100%;
            width: 100%;
        }
        textarea {
            text-align: center;
            line-height: 1.25;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            background: transparent;
            border: none;
            outline: none;
        }
        textarea::placeholder {
            color: #94a3b8;
            opacity: 0.4;
        }
    </style>
</head>
<body class="bg-slate-50">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useRef, useEffect } = React;

        const App = () => {
            // 資料結構包含：text, fontSize, color
            const initialCell = { text: '', fontSize: 14, color: '#1e293b' };
            const [data, setData] = useState(
                Array(9).fill(null).map((_, bIdx) => 
                    Array(9).fill(null).map((_, cIdx) => ({
                        ...initialCell,
                        color: (bIdx === 4 && cIdx === 4) ? '#ffffff' : '#1e293b',
                        fontSize: (bIdx === 4 && cIdx === 4) ? 18 : 14
                    }))
                )
            );
            
            const [activeCell, setActiveCell] = useState(null); // { bIdx, cIdx }
            const [isGlobalMode, setIsGlobalMode] = useState(false); // 是否為全體編輯模式
            const [isExporting, setIsExporting] = useState(false);
            const gridRef = useRef(null);

            // 當內容或樣式變更時
            const updateCell = (bIdx, cIdx, updates) => {
                const newData = data.map(block => [...block]);

                if (isGlobalMode && (updates.fontSize !== undefined || updates.color !== undefined)) {
                    // 全域模式：更新所有格子的樣式（不更新文字內容）
                    for (let i = 0; i < 9; i++) {
                        for (let j = 0; j < 9; j++) {
                            newData[i][j] = { ...newData[i][j], ...updates };
                        }
                    }
                } else {
                    // 單一模式：只更新特定格子
                    const targetCell = { ...newData[bIdx][cIdx], ...updates };
                    newData[bIdx][cIdx] = targetCell;

                    // 連動邏輯 (目標同步)
                    if (bIdx === 4 && cIdx !== 4) {
                        newData[cIdx][4] = { ...newData[cIdx][4], ...updates };
                    } else if (bIdx !== 4 && cIdx === 4) {
                        newData[4][bIdx] = { ...newData[4][bIdx], ...updates };
                    }
                }

                setData(newData);
            };

            const exportAsImage = async () => {
                if (!window.html2canvas) return;
                setActiveCell(null);
                setIsExporting(true);
                document.activeElement?.blur();

                setTimeout(async () => {
                    try {
                        const canvas = await window.html2canvas(gridRef.current, {
                            backgroundColor: '#ffffff',
                            scale: 2,
                            useCORS: true,
                            logging: false
                        });
                        const link = document.createElement('a');
                        link.download = `目標九宮格-${data[4][4].text || '我的目標'}.png`;
                        link.href = canvas.toDataURL('image/png');
                        link.click();
                    } catch (err) {
                        console.error("圖片匯出失敗", err);
                    } finally {
                        setIsExporting(false);
                    }
                }, 200);
            };

            const exportAsExcel = () => {
                if (!window.XLSX) return;
                const rows = [];
                for (let rb = 0; rb < 3; rb++) {
                    for (let rc = 0; rc < 3; rc++) {
                        const rowData = [];
                        for (let cb = 0; cb < 3; cb++) {
                            const bIdx = rb * 3 + cb;
                            for (let cc = 0; cc < 3; cc++) {
                                const cIdx = rc * 3 + cc;
                                rowData.push(data[bIdx][cIdx].text);
                            }
                        }
                        rows.push(rowData);
                    }
                }
                const worksheet = window.XLSX.utils.aoa_to_sheet(rows);
                const workbook = window.XLSX.utils.book_new();
                window.XLSX.utils.book_append_sheet(workbook, worksheet, "目標九宮格");
                window.XLSX.writeFile(workbook, `目標九宮格-${data[4][4].text || '我的目標'}.xlsx`);
            };

            const resetGrid = () => {
                if (window.confirm("確定要清除所有內容與設定嗎？")) {
                    setData(Array(9).fill(null).map((_, bIdx) => 
                        Array(9).fill(null).map((_, cIdx) => ({
                            ...initialCell,
                            color: (bIdx === 4 && cIdx === 4) ? '#ffffff' : '#1e293b',
                            fontSize: (bIdx === 4 && cIdx === 4) ? 18 : 14
                        }))
                    ));
                    setActiveCell(null);
                }
            };

            // 取得當前用於控制工具列的數值
            const controlValues = activeCell 
                ? data[activeCell.bIdx][activeCell.cIdx] 
                : data[4][4];

            return (
                <div className="min-h-screen py-8 px-4 flex flex-col items-center">
                    <div className="w-full max-w-[1100px]">
                        {/* 控制工具列 */}
                        <div className="flex flex-col lg:flex-row items-start lg:items-center justify-between mb-6 gap-4">
                            <div>
                                <h1 className="text-3xl font-extrabold text-slate-900 mb-1">目標九宮格</h1>
                                <p className="text-slate-500 text-sm">支援 81 格連動與批次樣式調整</p>
                            </div>
                            
                            <div className="flex flex-wrap items-center gap-3">
                                {/* 編輯模式切換 */}
                                <div className="flex items-center bg-slate-200 p-1 rounded-lg">
                                    <button 
                                        onClick={() => setIsGlobalMode(false)}
                                        className={`px-3 py-1 text-xs font-bold rounded-md transition-all ${!isGlobalMode ? 'bg-white shadow-sm text-indigo-600' : 'text-slate-500'}`}
                                    >
                                        單一格子
                                    </button>
                                    <button 
                                        onClick={() => setIsGlobalMode(true)}
                                        className={`px-3 py-1 text-xs font-bold rounded-md transition-all ${isGlobalMode ? 'bg-white shadow-sm text-indigo-600' : 'text-slate-500'}`}
                                    >
                                        全部格子
                                    </button>
                                </div>

                                {/* 樣式控制項 */}
                                <div className="flex items-center gap-3 bg-white p-2 rounded-xl shadow-sm border border-indigo-100">
                                    <div className="flex items-center gap-2">
                                        <span className="text-xs font-bold text-slate-400">大小</span>
                                        <input 
                                            type="range" min="8" max="40" 
                                            value={controlValues.fontSize}
                                            onChange={(e) => {
                                                const val = parseInt(e.target.value);
                                                if (isGlobalMode) {
                                                    updateCell(0, 0, { fontSize: val });
                                                } else if (activeCell) {
                                                    updateCell(activeCell.bIdx, activeCell.cIdx, { fontSize: val });
                                                }
                                            }}
                                            className="w-24 h-1.5 bg-slate-200 rounded-lg appearance-none cursor-pointer accent-indigo-600"
                                        />
                                        <span className="text-xs font-mono w-6">{controlValues.fontSize}</span>
                                    </div>
                                    <div className="w-px h-6 bg-slate-200"></div>
                                    <div className="flex items-center gap-2">
                                        <span className="text-xs font-bold text-slate-400">顏色</span>
                                        <input 
                                            type="color" 
                                            value={controlValues.color}
                                            onChange={(e) => {
                                                const val = e.target.value;
                                                if (isGlobalMode) {
                                                    updateCell(0, 0, { color: val });
                                                } else if (activeCell) {
                                                    updateCell(activeCell.bIdx, activeCell.cIdx, { color: val });
                                                }
                                            }}
                                            className="w-8 h-8 rounded-md cursor-pointer border-none bg-transparent"
                                        />
                                    </div>
                                    {activeCell && !isGlobalMode && (
                                        <button onClick={() => setActiveCell(null)} className="ml-1 p-1 hover:bg-slate-100 rounded-full text-slate-400">
                                            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>
                                        </button>
                                    )}
                                </div>

                                <div className="flex gap-2">
                                    <button onClick={exportAsImage} className="px-4 py-2 bg-indigo-600 hover:bg-indigo-700 text-white rounded-lg shadow-sm text-sm font-medium flex items-center gap-2 transition-colors">
                                        匯出圖片
                                    </button>
                                    <button onClick={exportAsExcel} className="px-4 py-2 bg-emerald-600 hover:bg-emerald-700 text-white rounded-lg shadow-sm text-sm font-medium flex items-center gap-2 transition-colors">
                                        匯出表格
                                    </button>
                                    <button onClick={resetGrid} className="px-4 py-2 bg-white border border-slate-200 text-slate-400 hover:text-red-600 rounded-lg text-sm transition-all">
                                        清除
                                    </button>
                                </div>
                            </div>
                        </div>

                        {/* 網格主體 */}
                        <div className="bg-white p-4 rounded-2xl shadow-2xl overflow-x-auto">
                            <div 
                                ref={gridRef}
                                className={`grid grid-cols-3 gap-2 bg-slate-300 p-2 border-2 border-slate-300 ${isExporting ? 'w-[1000px] h-[1000px]' : 'w-full aspect-square min-w-[700px]'}`}
                            >
                                {data.map((block, bIdx) => (
                                    <div 
                                        key={bIdx} 
                                        className={`grid grid-cols-3 gap-0.5 p-1 rounded-sm
                                            ${bIdx === 4 ? 'bg-indigo-50 border-2 border-indigo-200' : 'bg-slate-100'}`}
                                    >
                                        {block.map((cell, cIdx) => {
                                            const isMainGoal = bIdx === 4 && cIdx === 4;
                                            const isActive = activeCell?.bIdx === bIdx && activeCell?.cIdx === cIdx;
                                            
                                            let cellBg = "bg-white";
                                            if (isMainGoal) cellBg = "bg-indigo-600";
                                            else if (bIdx === 4 || cIdx === 4) cellBg = "bg-slate-50";

                                            return (
                                                <div 
                                                    key={cIdx} 
                                                    onClick={() => setActiveCell({ bIdx, cIdx })}
                                                    className={`relative border transition-all h-full cell-container cursor-text
                                                        ${cellBg} 
                                                        ${isActive ? 'ring-2 ring-indigo-400 z-30 border-transparent shadow-lg' : 'border-slate-200 hover:border-indigo-300'}`}
                                                >
                                                    <textarea
                                                        className="w-full h-full p-2 font-medium"
                                                        value={cell.text}
                                                        placeholder={isMainGoal ? "核心" : ""}
                                                        onChange={(e) => updateCell(bIdx, cIdx, { text: e.target.value })}
                                                        style={{ 
                                                            fontSize: `${cell.fontSize}px`,
                                                            color: cell.color,
                                                        }}
                                                        onFocus={() => setActiveCell({ bIdx, cIdx })}
                                                    />
                                                </div>
                                            );
                                        })}
                                    </div>
                                ))}
                            </div>
                        </div>
                        
                        <footer className="text-center py-8 text-slate-400 text-xs">
                            目標九宮格 · 編輯模式切換：單一/全部 · 支援 81 格自動連動
                        </footer>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
